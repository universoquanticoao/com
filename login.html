<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGIN - DELT∆</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg:#060d1a;
--surface:#0d1f35;
--accent:#00ff88;
--accent2:#3b82f6;
--text:#e2e8f0;
--muted:#64748b;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
  radial-gradient(ellipse 60% 50% at 30% 30%, rgba(0,255,136,0.07) 0%, transparent 60%),
  radial-gradient(ellipse 50% 40% at 70% 70%, rgba(59,130,246,0.07) 0%, transparent 60%);
pointer-events:none;
}

.box{
position:relative;
z-index:1;
background:rgba(13,31,53,0.9);
border:1px solid rgba(0,255,136,0.15);
padding:48px 40px;
border-radius:20px;
width:100%;
max-width:440px;
backdrop-filter:blur(20px);
}

.logo{
font-family:'Rajdhani',sans-serif;
font-size:13px;
letter-spacing:4px;
color:var(--muted);
text-transform:uppercase;
margin-bottom:8px;
}

h2{
font-family:'Rajdhani',sans-serif;
font-size:32px;
font-weight:700;
letter-spacing:2px;
margin-bottom:20px;
color:var(--text);
}

/* BADGES */
.badges{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:24px;
}

.badge{
display:inline-block;
font-size:11px;
letter-spacing:2px;
padding:4px 12px;
border-radius:20px;
text-transform:uppercase;
font-family:'Rajdhani',sans-serif;
font-weight:600;
}

.badge.uni{
background:rgba(0,255,136,0.1);
border:1px solid rgba(0,255,136,0.3);
color:var(--accent);
}

.badge.curso{
background:rgba(59,130,246,0.1);
border:1px solid rgba(59,130,246,0.3);
color:var(--accent2);
}

.badge.area{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
color:var(--muted);
}

.back-link{
display:inline-block;
font-size:12px;
letter-spacing:2px;
color:var(--muted);
text-decoration:none;
margin-bottom:20px;
font-family:'Rajdhani',sans-serif;
transition:0.2s;
}
.back-link:hover{color:var(--accent);}

.field{margin-bottom:16px;}

label{
display:block;
font-size:11px;
letter-spacing:2px;
color:var(--muted);
text-transform:uppercase;
margin-bottom:6px;
}

input, select{
width:100%;
padding:13px 16px;
background:rgba(6,13,26,0.8);
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
color:var(--text);
font-size:15px;
font-family:'Inter',sans-serif;
transition:0.3s;
outline:none;
}

input:focus, select:focus{
border-color:rgba(0,255,136,0.4);
background:rgba(6,13,26,0.95);
}

select option{background:#0d1f35;}

.password-wrap{position:relative;}
.eye{
position:absolute;right:14px;top:50%;transform:translateY(-50%);
cursor:pointer;font-size:18px;opacity:0.5;transition:0.2s;
}
.eye:hover{opacity:1;}

.btns{
display:flex;flex-direction:column;gap:10px;margin-top:24px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
font-family:'Rajdhani',sans-serif;
font-weight:600;
letter-spacing:2px;
cursor:pointer;
transition:0.3s;
}

button:hover:not(:disabled){transform:translateY(-2px);}
button:disabled{opacity:0.5;cursor:not-allowed;}

.loginBtn{background:var(--accent);color:#060d1a;}

.registerBtn{
background:transparent;
color:var(--accent2);
border:1px solid var(--accent2);
}
.registerBtn:hover:not(:disabled){background:rgba(59,130,246,0.1);}

.forgotBtn{
background:transparent;color:var(--muted);border:none;
font-size:13px;letter-spacing:1px;padding:8px;
}
.forgotBtn:hover:not(:disabled){color:var(--text);transform:none;}

.msg{
margin-top:16px;padding:12px 16px;border-radius:8px;
font-size:13px;display:none;
}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;display:block;}
.msg.success{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--accent);display:block;}
.msg.info{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);color:#60a5fa;display:block;}

.spinner-wrap{display:none;text-align:center;margin-top:16px;}
.spinner{width:28px;height:28px;border:3px solid rgba(0,255,136,0.2);border-top:3px solid var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:auto;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

@media(max-width:480px){.box{padding:36px 24px;}}
</style>
</head>
<body>

<div class="box">
  <div class="logo">PREPARATÓRIO VIRTUAL COM DELT∆</div>
  <a class="back-link" href="index.html">← VOLTAR AO INÍCIO</a>
  <h2>ACESSO</h2>

  <!-- Badges da universidade, curso e área -->
  <div class="badges" id="badges"></div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="o-seu@email.com">
  </div>

  <div class="field">
    <label>Senha</label>
    <div class="password-wrap">
      <input type="password" id="senha" placeholder="••••••••">
      <span class="eye" onclick="toggleSenha()">👁</span>
    </div>
  </div>

  <!-- Campo área oculto (preenchido automaticamente) -->
  <input type="hidden" id="area">

  <div class="btns">
    <button class="loginBtn" id="btnLogin" onclick="login()">ENTRAR</button>
    <button class="registerBtn" id="btnRegister" onclick="register()">CRIAR CONTA</button>
    <button class="forgotBtn" id="btnForgot" onclick="recuperar()">Esqueci a senha</button>
  </div>

  <div class="spinner-wrap" id="loading"><div class="spinner"></div></div>
  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBADytEHr9NzwFdGmd-zq26t88Vnl65js",
  authDomain: "preparatoriovirtualcomde-38c0a.firebaseapp.com",
  projectId: "preparatoriovirtualcomde-38c0a",
  storageBucket: "preparatoriovirtualcomde-38c0a.firebasestorage.app",
  messagingSenderId: "211289899773",
  appId: "1:211289899773:web:dfc22d377c7172f936b494"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const msgEl    = document.getElementById("msg");
const loading  = document.getElementById("loading");
const btnLogin = document.getElementById("btnLogin");
const btnRegister = document.getElementById("btnRegister");
const btnForgot   = document.getElementById("btnForgot");

// Pegar parâmetros da URL
const params = new URLSearchParams(window.location.search);
const uniParam    = params.get("uni")   || "";
const cursoParam  = params.get("curso") || "";
const areaParam   = params.get("area")  || "";

// Preencher área oculta
document.getElementById("area").value = areaParam;

// Mostrar badges
const badgesDiv = document.getElementById("badges");
if(uniParam){
  badgesDiv.innerHTML += `<span class="badge uni">${uniParam}</span>`;
}
if(cursoParam){
  badgesDiv.innerHTML += `<span class="badge curso">${cursoParam}</span>`;
}
if(areaParam){
  const areaLabel = areaParam.charAt(0).toUpperCase() + areaParam.slice(1);
  badgesDiv.innerHTML += `<span class="badge area">${areaLabel}</span>`;
}

function showMsg(texto, tipo){
  msgEl.className = "msg " + tipo;
  msgEl.innerText = texto;
}

function showLoading(){
  loading.style.display = "block";
  btnLogin.disabled = true;
  btnRegister.disabled = true;
  btnForgot.disabled = true;
}

function hideLoading(){
  loading.style.display = "none";
  btnLogin.disabled = false;
  btnRegister.disabled = false;
  btnForgot.disabled = false;
}

function validar(email, senha, area){
  if(!email || !senha){
    showMsg("Preenche o email e a senha.", "error");
    return false;
  }
  if(!area){
    showMsg("Volta atrás e escolhe a tua área.", "error");
    return false;
  }
  if(senha.length < 6){
    showMsg("A senha deve ter pelo menos 6 caracteres.", "error");
    return false;
  }
  return true;
}

// LOGIN
window.login = async function(){
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;
  const area  = document.getElementById("area").value;

  msgEl.className = "msg";
  if(!validar(email, senha, area)) return;
  showLoading();

  try {
    const cred = await signInWithEmailAndPassword(auth, email, senha);
    const ref  = doc(db, "users", cred.user.uid);
    const snap = await getDoc(ref);

    if(!snap.exists()){
      showMsg("Conta não encontrada no sistema. Cria uma conta primeiro.", "error");
      hideLoading();
      return;
    }

    const data = snap.data();

    if(data.approved !== true){
      showMsg("⏳ Conta pendente. Aguarda a aprovação do admin.", "info");
      hideLoading();
      return;
    }

    // Guardar tudo no localStorage
    localStorage.setItem("user", email);
    localStorage.setItem("uid", cred.user.uid);
    localStorage.setItem("area", data.area || area);
    localStorage.setItem("uni", uniParam || data.uni || "");
    localStorage.setItem("curso", cursoParam || data.curso || "");

    window.location.href = "aulas.html";

  } catch(e){
    showMsg("Email ou senha inválidos.", "error");
    hideLoading();
  }
}

// REGISTO
window.register = async function(){
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;
  const area  = document.getElementById("area").value;

  msgEl.className = "msg";
  if(!validar(email, senha, area)) return;
  showLoading();

  try {
    const newUser = await createUserWithEmailAndPassword(auth, email, senha);

    await setDoc(doc(db, "users", newUser.user.uid), {
      uid:       newUser.user.uid,
      email:     email,
      area:      area,
      uni:       uniParam,
      curso:     cursoParam,
      approved:  false,
      createdAt: Date.now()
    });

    showMsg("✅ Conta criada! Aguarda a aprovação do admin para fazer login.", "success");

  } catch(e){
    if(e.code === "auth/email-already-in-use"){
      showMsg("Este email já está registado. Faz login.", "error");
    } else {
      showMsg("Erro ao criar conta: " + e.message, "error");
    }
  } finally {
    hideLoading();
  }
}

// RECUPERAR SENHA
window.recuperar = async function(){
  const email = document.getElementById("email").value.trim();
  msgEl.className = "msg";
  if(!email){ showMsg("Escreve o teu email primeiro.", "error"); return; }
  showLoading();
  try {
    await sendPasswordResetEmail(auth, email);
    showMsg("✅ Email de recuperação enviado! Verifica a tua caixa de entrada.", "success");
  } catch(e){
    showMsg("Email não encontrado. Verifica se está correcto.", "error");
  } finally {
    hideLoading();
  }
}

window.toggleSenha = function(){
  const s = document.getElementById("senha");
  s.type = s.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
