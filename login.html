<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGIN - UNIVERSO QUÂNTICO | DIATOMA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#020818;
  --surface:#060f22;
  --accent:#00d4ff;
  --accent2:#7c3aed;
  --accent3:#00ffaa;
  --text:#e2e8f0;
  --muted:#4a5a7a;
}
body{
  font-family:'Exo 2',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  gap:20px;
}

/* Starfield */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:var(--o);}50%{opacity:0.05;}}

body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 25% 25%, rgba(0,212,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 75% 75%, rgba(124,58,237,0.07) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}

/* ── PURCHASE SUMMARY ── */
.purchase-summary{
  position:relative;z-index:1;
  background:rgba(6,15,34,0.85);
  border:1px solid rgba(0,212,255,0.18);
  border-radius:16px;
  padding:20px 32px;
  width:100%;max-width:460px;
  backdrop-filter:blur(20px);
  display:none;
}
.ps-title{
  font-family:'Orbitron',monospace;
  font-size:10px;letter-spacing:3px;
  color:var(--muted);text-transform:uppercase;margin-bottom:12px;
}
.ps-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:8px;}
.ps-label{color:var(--muted);}
.ps-value{color:var(--text);font-weight:500;}
.ps-price{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--accent);}
.ps-divider{width:100%;height:1px;background:rgba(0,212,255,0.08);margin:12px 0;}
.ps-comprov-title{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-family:'Orbitron',monospace;margin-bottom:10px;}
.ps-btns{display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:1px;transition:0.3s;text-decoration:none;display:inline-block;font-family:'Exo 2',sans-serif;}
.btn:hover{transform:translateY(-2px);}
.whatsapp{background:#25D366;color:white;}
.email-btn{background:var(--accent2);color:white;}

/* ── MAIN BOX ── */
.box{
  position:relative;z-index:1;
  background:rgba(6,15,34,0.92);
  border:1px solid rgba(0,212,255,0.15);
  padding:48px 40px;
  border-radius:20px;
  width:100%;max-width:460px;
  backdrop-filter:blur(24px);
  box-shadow:0 0 60px rgba(0,212,255,0.05), inset 0 0 40px rgba(124,58,237,0.03);
}

/* Mini logo no topo */
.mini-logo{
  display:flex;align-items:center;gap:16px;margin-bottom:16px;
}
.mini-logo svg{width:80px;height:80px;flex-shrink:0;}
.mini-logo-text{}
.brand-name{
  font-family:'Orbitron',monospace;
  font-size:19px;font-weight:900;
  letter-spacing:2px;color:var(--accent);
  text-transform:uppercase;line-height:1.2;
  text-shadow:0 0 18px rgba(0,212,255,0.45);
}
.brand-sub{
  font-family:'Exo 2',sans-serif;
  font-size:7px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;margin-top:4px;
  opacity:0.6;
}

/* Orbit animations */
.orbit-1{animation:rot 6s linear infinite;transform-origin:40px 40px;}
.orbit-2{animation:rot-rev 9s linear infinite;transform-origin:40px 40px;}
.orbit-3{animation:rot 14s linear infinite;transform-origin:40px 40px;}
.core-pulse{animation:cpulse 2.5s ease-in-out infinite;transform-origin:40px 40px;}
.q-dot{animation:qdot 2s ease-in-out infinite;}
.q-dot:nth-child(2){animation-delay:0.4s;}
.q-dot:nth-child(3){animation-delay:0.8s;}
@keyframes rot{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes rot-rev{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
@keyframes cpulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.6;transform:scale(0.88);}}
@keyframes qdot{0%,100%{opacity:1;}50%{opacity:0.15;}}

.divider-line{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.3),rgba(124,58,237,0.3),transparent);
  margin:16px 0;
}

h2{
  font-family:'Orbitron',monospace;
  font-size:28px;font-weight:900;
  letter-spacing:3px;margin-bottom:20px;
  color:var(--text);
}
h2 span{color:var(--accent);}

.badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;}
.badge{
  display:inline-block;font-size:10px;letter-spacing:2px;
  padding:4px 12px;border-radius:20px;text-transform:uppercase;
  font-family:'Orbitron',monospace;font-weight:600;
}
.badge.uni{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:var(--accent);}
.badge.curso{background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.3);color:#a78bfa;}

.back-link{
  display:inline-block;font-size:11px;letter-spacing:2px;
  color:var(--muted);text-decoration:none;margin-bottom:20px;
  font-family:'Orbitron',monospace;transition:0.2s;
}
.back-link:hover{color:var(--accent);}

.field{margin-bottom:16px;}
label{
  display:block;font-size:10px;letter-spacing:3px;
  color:var(--muted);text-transform:uppercase;margin-bottom:6px;
  font-family:'Orbitron',monospace;
}
input{
  width:100%;padding:13px 16px;
  background:rgba(2,8,24,0.8);
  border:1px solid rgba(0,212,255,0.1);
  border-radius:10px;color:var(--text);
  font-size:15px;font-family:'Exo 2',sans-serif;
  transition:0.3s;outline:none;
}
input:focus{border-color:rgba(0,212,255,0.4);background:rgba(2,8,24,0.98);}
input::placeholder{color:var(--muted);}
.password-wrap{position:relative;}
.eye{
  position:absolute;right:14px;top:50%;
  transform:translateY(-50%);cursor:pointer;
  font-size:17px;opacity:0.4;transition:0.2s;
}
.eye:hover{opacity:1;}

.btns{display:flex;flex-direction:column;gap:10px;margin-top:24px;}
button{
  width:100%;padding:14px;border:none;border-radius:10px;
  font-size:14px;font-family:'Orbitron',monospace;
  font-weight:700;letter-spacing:2px;cursor:pointer;transition:0.3s;
}
button:hover:not(:disabled){transform:translateY(-2px);}
button:disabled{opacity:0.5;cursor:not-allowed;}
.loginBtn{
  background:linear-gradient(135deg,var(--accent),#0099cc);
  color:#020818;
  box-shadow:0 0 20px rgba(0,212,255,0.25);
}
.loginBtn:hover:not(:disabled){box-shadow:0 0 30px rgba(0,212,255,0.4);}
.registerBtn{
  background:transparent;color:#a78bfa;
  border:1px solid rgba(124,58,237,0.5);
}
.registerBtn:hover:not(:disabled){background:rgba(124,58,237,0.1);}
.registerBtn.hidden{display:none;}
.forgotBtn{
  background:transparent;color:var(--muted);
  border:none;font-size:11px;letter-spacing:1px;padding:8px;
}
.forgotBtn:hover:not(:disabled){color:var(--text);transform:none;}

.msg{margin-top:16px;padding:12px 16px;border-radius:8px;font-size:13px;display:none;}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;display:block;}
.msg.success{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:var(--accent);display:block;}
.msg.info{background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.3);color:#a78bfa;display:block;}

.spinner-wrap{display:none;text-align:center;margin-top:16px;}
.spinner{
  width:28px;height:28px;
  border:3px solid rgba(0,212,255,0.2);
  border-top:3px solid var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;margin:auto;
}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

@media(max-width:480px){.box{padding:32px 20px;}.purchase-summary{padding:16px 20px;}}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail,
  deleteUser
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc, getDoc, setDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBADytEHr9NzwFdGmd-zq26t88Vnl65js",
  authDomain: "preparatoriovirtualcomde-38c0a.firebaseapp.com",
  projectId: "preparatoriovirtualcomde-38c0a",
  storageBucket: "preparatoriovirtualcomde-38c0a.firebasestorage.app",
  messagingSenderId: "211289899773",
  appId: "1:211289899773:web:dfc22d377c7172f936b494"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const msgEl       = document.getElementById("msg");
const loading     = document.getElementById("loading");
const btnLogin    = document.getElementById("btnLogin");
const btnRegister = document.getElementById("btnRegister");
const btnForgot   = document.getElementById("btnForgot");

const params       = new URLSearchParams(window.location.search);
const tipoParam    = params.get("tipo")    || "";
const uniParam     = params.get("uni")     || "";
const cursoParam   = params.get("curso")   || "";
const areaParam    = params.get("area")    || "";
const duracaoParam = params.get("duracao") || "";
const precoParam   = params.get("preco")   || "";

const vemDoFluxo = !!(duracaoParam && precoParam && cursoParam);

if(!vemDoFluxo){
  btnRegister.classList.add("hidden");
}

if(params.get("expirado")){
  msgEl.className = "msg error";
  msgEl.innerText = "⚠️ O teu acesso expirou. Podes criar uma nova conta com o mesmo email.";
}

document.getElementById("area").value    = areaParam;
document.getElementById("duracao").value = duracaoParam;
document.getElementById("preco").value   = precoParam;

const badgesDiv = document.getElementById("badges");
if(uniParam)   badgesDiv.innerHTML += `<span class="badge uni">${uniParam}</span>`;
if(cursoParam) badgesDiv.innerHTML += `<span class="badge curso">${cursoParam}</span>`;

const DUR_LABELS = {
  "30":"1 Mês (30 dias)",
  "90":"3 Meses (90 dias)",
  "180":"6 Meses (180 dias)",
  "365":"1 Ano (365 dias)"
};

if(vemDoFluxo){
  const summary = document.getElementById("purchaseSummary");
  const psUniRow = document.getElementById("psUni").closest(".ps-row");
  if(uniParam){
    document.getElementById("psUni").innerText = uniParam;
  } else {
    if(psUniRow) psUniRow.style.display = "none";
  }
  document.getElementById("psCurso").innerText = cursoParam;
  document.getElementById("psDur").innerText   = DUR_LABELS[duracaoParam] || duracaoParam + " dias";
  const precoFormatado = parseInt(precoParam).toLocaleString("pt-AO") + " KZ";
  document.getElementById("psPreco").innerText = precoFormatado;

  const waUni = uniParam ? `Universidade: ${uniParam}\n` : "";
  const wa = `Olá, envio o meu comprovativo de pagamento do Universo Quântico - Preparatório Virtual com DIATOMA.\n\nCurso: ${cursoParam}\n${waUni}Duração: ${DUR_LABELS[duracaoParam]||duracaoParam+" dias"}\nValor: ${precoFormatado}`;
  document.getElementById("waLink").href    = `https://wa.me/244950509560?text=${encodeURIComponent(wa)}`;
  const emailBody = `Olá,\n\nComprovativo de pagamento:\n\nCurso: ${cursoParam}\n${waUni}Duração: ${DUR_LABELS[duracaoParam]||duracaoParam+" dias"}\nValor: ${precoFormatado}\n\nObrigado.`;
  document.getElementById("emailLink").href = `mailto:deltaigualb.bmenos4.a.c@gmail.com?subject=Comprovativo%20de%20Pagamento%20-%20Universo%20Quântico&body=${encodeURIComponent(emailBody)}`;
  summary.style.display = "block";
}

function showMsg(texto, tipo){
  msgEl.className = "msg " + tipo;
  msgEl.innerText = texto;
}
function showLoading(){
  loading.style.display = "block";
  btnLogin.disabled = btnRegister.disabled = btnForgot.disabled = true;
}
function hideLoading(){
  loading.style.display = "none";
  btnLogin.disabled = btnRegister.disabled = btnForgot.disabled = false;
}

function validarLogin(email, senha){
  if(!email || !senha){ showMsg("Preenche o email e a senha.", "error"); return false; }
  if(senha.length < 6){ showMsg("A senha deve ter pelo menos 6 caracteres.", "error"); return false; }
  return true;
}

function validarRegisto(email, senha, area){
  if(!email || !senha){ showMsg("Preenche o email e a senha.", "error"); return false; }
  if(!area){            showMsg("Volta atrás e escolhe o teu curso.", "error"); return false; }
  if(senha.length < 6){ showMsg("A senha deve ter pelo menos 6 caracteres.", "error"); return false; }
  return true;
}

window.login = async function(){
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;
  msgEl.className = "msg";
  if(!validarLogin(email, senha)) return;
  showLoading();
  try {
    const cred = await signInWithEmailAndPassword(auth, email, senha);
    const ref  = doc(db, "users", cred.user.uid);
    const snap = await getDoc(ref);
    if(!snap.exists()){
      try { await deleteUser(cred.user); } catch(e){}
      showMsg("✅ A tua conta foi removida pelo administrador. Podes criar uma nova conta.", "success");
      hideLoading(); return;
    }
    const data = snap.data();
    if(data.approved !== true){
      document.getElementById("purchaseSummary").style.display = "none";
      showMsg("⏳ Conta pendente. Aguarda a aprovação do admin.", "info");
      hideLoading(); return;
    }
    const expiryTs = data.expiryDate || (data.approvedAt ? data.approvedAt + 365*24*60*60*1000 : null);
    if(expiryTs && Date.now() >= expiryTs){
      try { await deleteDoc(ref); }        catch(e){}
      try { await deleteUser(cred.user); } catch(e){}
      showMsg("✅ O teu acesso expirou. A conta foi removida — podes criar uma nova conta.", "success");
      hideLoading(); return;
    }
    document.getElementById("purchaseSummary").style.display = "none";
    localStorage.setItem("user",  email);
    localStorage.setItem("uid",   cred.user.uid);
    localStorage.setItem("area",  data.area  || areaParam);
    localStorage.setItem("uni",   data.uni   || uniParam  || "");
    localStorage.setItem("curso", data.curso || cursoParam || "");
    window.location.href = "aulas.html";
  } catch(e){
    showMsg("Email ou senha inválidos.", "error");
    hideLoading();
  }
}

window.register = async function(){
  const email   = document.getElementById("email").value.trim();
  const senha   = document.getElementById("senha").value;
  const area    = document.getElementById("area").value;
  const duracao = document.getElementById("duracao").value;
  const preco   = document.getElementById("preco").value;
  msgEl.className = "msg";
  if(!validarRegisto(email, senha, area)) return;
  showLoading();
  try {
    const newUser = await createUserWithEmailAndPassword(auth, email, senha);
    await setDoc(doc(db, "users", newUser.user.uid), {
      uid:       newUser.user.uid,
      email,
      tipo:      tipoParam,
      area,
      uni:       uniParam,
      curso:     cursoParam,
      duracao,
      preco,
      approved:  false,
      createdAt: Date.now()
    });
    showMsg("✅ Conta criada! Envia o comprovativo de pagamento e aguarda a aprovação do admin.", "success");
  } catch(e){
    if(e.code === "auth/email-already-in-use"){
      showMsg("Este email já está registado. Faz login.", "error");
    } else {
      showMsg("Erro ao criar conta: " + e.message, "error");
    }
  } finally {
    hideLoading();
  }
}

window.recuperar = async function(){
  const email = document.getElementById("email").value.trim();
  msgEl.className = "msg";
  if(!email){ showMsg("Escreve o teu email primeiro.", "error"); return; }
  showLoading();
  try {
    await sendPasswordResetEmail(auth, email);
    showMsg("✅ Email de recuperação enviado! Verifica a tua caixa de entrada.", "success");
  } catch(e){
    showMsg("Email não encontrado. Verifica se está correcto.", "error");
  } finally {
    hideLoading();
  }
}

window.toggleSenha = function(){
  const s = document.getElementById("senha");
  s.type = s.type === "password" ? "text" : "password";
}
</script>
</body>
</html>
